<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Paper Scissors</title>
<link rel="stylesheet" href="rps.css">
</head>
<body>
<div class="wrap">

  <div class="masthead">
    <h1>Rock · Paper · Scissors</h1>
    <span class="best-of">best score kept below</span>
  </div>

  <!-- Scoreboard: updated by rps.js after every round -->
  <div class="scoreboard">
    <div class="score-box">
      <span class="score-label">Darlington</span>
      <span class="score-value" id="player-score">0</span>
    </div>
    <div class="score-box">
      <span class="score-label">CPU</span>
      <span class="score-value" id="cpu-score">0</span>
    </div>
    <div class="score-box">
      <span class="score-label">Ties</span>
      <span class="score-value" id="tie-score">0</span>
    </div>
  </div>

  <!-- Where the played hands show up after each round -->
  <div class="arena">
    <div class="hand-slot">
      <span class="hand" id="player-hand">?</span>
      <span class="hand-label">Darlington</span>
    </div>
    <span class="vs">vs</span>
    <div class="hand-slot">
      <span class="hand" id="cpu-hand">?</span>
      <span class="hand-label">CPU</span>
    </div>
  </div>

  <!-- Round result text, e.g. "You win — rock beats scissors" -->
  <p class="result" id="result">Choose a hand to start</p>

  <!-- The three move buttons the player clicks -->
  <div class="choices">
    <button class="choice" data-choice="rock">
      <span class="choice-icon">🪨</span>
      <span>Rock</span>
    </button>
    <button class="choice" data-choice="paper">
      <span class="choice-icon">📄</span>
      <span>Paper</span>
    </button>
    <button class="choice" data-choice="scissors">
      <span class="choice-icon">✂️</span>
      <span>Scissors</span>
    </button>
  </div>

  <button class="reset" id="reset-btn">Reset score</button>

</div>

<script src="rps.js"></script>
</body>
</html>
